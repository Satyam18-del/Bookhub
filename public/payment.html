<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout - BookHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">

📚 BookHub Checkout

</a>

</div>

</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow p-4">

<h2 class="text-center mb-4">

Secure Checkout

</h2>

<div class="row">

<div class="col-md-4 text-center">

<img

id="bookImage"

src=""

class="img-fluid rounded shadow"

style="height:280px;object-fit:cover;">

</div>

<div class="col-md-8">

<h3 id="bookTitle"></h3>

<h4 class="text-success">

₹<span id="bookPrice"></span>

</h4>

<hr>

<div class="mb-3">

<label>

Full Name

</label>

<input

id="customer"

class="form-control"

placeholder="Enter your name">

</div>

<div class="mb-3">

<label>

Phone Number

</label>

<input

id="phone"

class="form-control"

placeholder="9876543210">

</div>

<div class="mb-3">

<label>

Delivery Address

</label>

<textarea

id="address"

class="form-control"

rows="3"

placeholder="Enter Address">

</textarea>

</div>

<div class="mb-3">

<label>

Payment Method

</label>

<select

id="payment"

class="form-select">

<option>

UPI

</option>

<option>

Credit Card

</option>

<option>

Debit Card

</option>

<option>

Cash On Delivery

</option>

</select>

</div>

<button

class="btn btn-success w-100"

onclick="payNow()">

Proceed To Pay

</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="payment.js"></script>

</body>

</html>
