<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Order Successful</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow text-center p-5">

<h1 class="text-success">

✔

</h1>

<h2>

Order Placed Successfully!

</h2>

<p class="mt-3">

Thank you for shopping with

<strong>

BookHub

</strong>

</p>

<img

id="successImage"

class="img-fluid rounded my-3"

style="height:300px;object-fit:cover;">

<h4 id="successTitle"></h4>

<h3 class="text-success">

₹<span id="successPrice"></span>

</h3>

<p>

Payment Method:

<strong id="paymentMethod"></strong>

</p>

<a

href="index.html"

class="btn btn-primary btn-lg mt-3">

Continue Shopping

</a>

</div>

</div>

</div>

</div>

<script>

document.getElementById("successTitle").innerText=
localStorage.getItem("bookTitle");

document.getElementById("successPrice").innerText=
localStorage.getItem("bookPrice");

document.getElementById("paymentMethod").innerText=
localStorage.getItem("paymentMethod");

document.getElementById("successImage").src=
localStorage.getItem("bookImage");

</script>

</body>

</html>
